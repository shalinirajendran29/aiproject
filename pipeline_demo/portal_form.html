<!DOCTYPE html>
<html>
<head>
    <title>Mock Web Portal Form</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 400px;
        }
        h2 { margin-bottom: 20px; color: #1e293b; font-size: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #475569; font-size: 0.9rem; }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95rem;
            transition: border 0.2s;
        }
        input:focus { border-color: #3b82f6; outline: none; }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Customer Portal Intake</h2>
        <form>
            <div class="form-group">
                <label for="client_name">Client Full Name</label>
                <input type="text" id="client_name" name="client_name" placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label for="user_mail">User E-mail</label>
                <input type="email" id="user_mail" name="user_mail" placeholder="Enter email address">
            </div>
            <div class="form-group">
                <label for="phone_num">Telephone Number</label>
                <input type="text" id="phone_num" name="phone_num" placeholder="Enter contact number">
            </div>
            <div class="form-group">
                <label for="birthdate">Date of Birth</label>
                <input type="text" id="birthdate" name="birthdate" placeholder="DD/MM/YYYY">
            </div>
            <div class="form-group">
                <label for="home_address">Mailing Address</label>
                <input type="text" id="home_address" name="home_address" placeholder="Enter home address">
            </div>
            <div class="form-group">
                <label for="identity_card">ID/Passport Card</label>
                <input type="text" id="identity_card" name="identity_card" placeholder="Enter card identifier">
            </div>
            <button type="button" class="btn-submit" id="submit_btn">Confirm & Submit</button>
        </form>
    </div>
    <script>
        document.getElementById('submit_btn').addEventListener('click', function() {
            // Replace form content with a submission confirmation page
            document.querySelector('.form-container').innerHTML = `
                <h2 style="color: #10b981; margin-top: 10px;">✓ Submission Successful!</h2>
                <div style="text-align: center; margin-top: 25px; margin-bottom: 25px;">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <p style="text-align: center; color: #475569; font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px;">
                    Your details have been successfully saved and stored in the customer portal database.
                </p>
                <div style="background: #f1f5f9; padding: 12px; border-radius: 6px; font-size: 0.85rem; color: #64748b; text-align: center;">
                    Reference Code: MOCK-${Math.floor(100000 + Math.random() * 900000)}
                </div>
            `;
        });
    </script>
</body>
</html>
